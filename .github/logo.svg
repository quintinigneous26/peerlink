<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)"/>

  <!-- P2P nodes -->
  <circle cx="60" cy="60" r="20" fill="white"/>
  <circle cx="140" cy="60" r="20" fill="white"/>
  <circle cx="60" cy="140" r="20" fill="white"/>
  <circle cx="140" cy="140" r="20" fill="white"/>
  <circle cx="100" cy="100" r="25" fill="white"/>

  <!-- Connection lines -->
  <line x1="80" y1="80" x2="120" y2="80" stroke="white" stroke-width="4"/>
  <line x1="80" y1="80" x2="80" y2="120" stroke="white" stroke-width="4"/>
  <line x1="120" y1="80" x2="120" y2="120" stroke="white" stroke-width="4"/>
  <line x1="80" y1="120" x2="120" y2="120" stroke="white" stroke-width="4"/>

  <!-- Center connections -->
  <line x1="80" y1="80" x2="100" y2="100" stroke="white" stroke-width="4"/>
  <line x1="120" y1="80" x2="100" y2="100" stroke="white" stroke-width="4"/>
  <line x1="80" y1="120" x2="100" y2="100" stroke="white" stroke-width="4"/>
  <line x1="120" y1="120" x2="100" y2="100" stroke="white" stroke-width="4"/>

  <!-- Link icon -->
  <path d="M90 100 L110 100 M95 95 L95 105 M105 95 L105 105" stroke="#00d4ff" stroke-width="3" fill="none"/>
</svg>
