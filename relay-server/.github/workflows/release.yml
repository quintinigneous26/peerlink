name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o relay-server-${{ steps.version.outputs.VERSION }}-linux-amd64 .

      - name: Build binary (macOS)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o relay-server-${{ steps.version.outputs.VERSION }}-darwin-amd64 .

      - name: Build binary (Windows)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o relay-server-${{ steps.version.outputs.VERSION }}-windows-amd64.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: relay-server-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: relay-server-*
          body: |
            ## Relay Server ${{ steps.version.outputs.VERSION }}

            ### Changes
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Downloads

            | Platform | Binary |
            |----------|--------|
            | Linux x64 | `relay-server-${{ steps.version.outputs.VERSION }}-linux-amd64` |
            | macOS x64 | `relay-server-${{ steps.version.outputs.VERSION }}-darwin-amd64` |
            | Windows x64 | `relay-server-${{ steps.version.outputs.VERSION }}-windows-amd64.exe` |

            ### Docker

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/relay-server:${{ steps.version.outputs.VERSION }}
            ```
        draft: false
        prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Docker 构建和发布
  docker:
    name: Docker Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/relay-server:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/relay-server:latest
            ghcr.io/${{ github.repository_owner }}/relay-server:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/relay-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
