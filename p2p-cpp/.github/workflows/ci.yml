name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # 代码格式检查
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src include -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror
        echo "Formatting check passed"

  # Linux 构建
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-all-dev \
            libssl-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libgtest-dev \
            nlohmann-json3-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/

  # macOS 构建
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install boost openssl protobuf cmake googletest
          brew install nlohmann-json

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl)

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/

  # Windows 构建
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg dependencies
        run: |
          vcpkg install boost-asio boost-system boost-filesystem boost-thread openssl protobuf gtest nlohmann-json

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBUILD_TESTING=ON `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$env:NUMBER_OF_PROCESSORS

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure -C ${{ env.BUILD_TYPE }} || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/

  # 静态分析
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        run: |
          find src -name "*.cpp" | xargs clang-tidy --config-file=.clang-tidy || true

  # 安全扫描
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip

      - name: Install security tools
        run: |
          pip3 install bandit safety

      - name: Run Bandit (if Python scripts exist)
        run: |
          find . -name "*.py" | head -5
          bandit -r . -f json || true

      - name: Run Safety check
        run: |
          safety check --json || true

  # 代码覆盖率
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-all-dev \
            libssl-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libgtest-dev \
            lcov \
            nlohmann-json3-dev

      - name: Configure with coverage
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DBUILD_TESTING=ON

      - name: Build and test with coverage
        run: |
          cmake --build build -j$(nproc)
          cd build
          ctest --output-on-failure
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.info
          flags: cpp
          fail_ci_if_error: false

  # 汇总状态
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [format-check, build-linux, build-macos, build-windows]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Format Check: ${{ needs.format-check.result }}"
          echo "Linux Build: ${{ needs.build-linux.result }}"
          echo "macOS Build: ${{ needs.build-macos.result }}"
          echo "Windows Build: ${{ needs.build-windows.result }}"

          if [[ "${{ needs.format-check.result }}" == "failure" ]]; then
            echo "::error::Format check failed"
            exit 1
          fi

          if [[ "${{ needs.build-linux.result }}" == "failure" ]]; then
            echo "::error::Linux build failed"
            exit 1
          fi
