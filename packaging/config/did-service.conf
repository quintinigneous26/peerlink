# DID Service Configuration
# Environment variables for systemd service

# Server binding
DID_HOST=0.0.0.0
DID_PORT=8081

# Redis connection
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_DB=2

# JWT settings
JWT_SECRET=CHANGE_THIS_JWT_SECRET_KEY
JWT_ALGORITHM=HS256
JWT_EXPIRATION=3600

# DID settings
DID_METHOD=p2p
DID_NETWORK=mainnet

# Logging
LOG_LEVEL=INFO
LOG_FILE=/var/log/p2p-platform/did-service.log

# Rate limiting
RATE_LIMIT_REQUESTS=100
RATE_LIMIT_WINDOW=60
