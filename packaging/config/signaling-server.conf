# Signaling Server Configuration
# Environment variables for systemd service

# Server binding
SIGNALING_HOST=0.0.0.0
SIGNALING_PORT=8080

# Redis connection
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_DB=1

# WebSocket settings
WS_MAX_CONNECTIONS=5000
WS_PING_INTERVAL=30
WS_PING_TIMEOUT=10

# Logging
LOG_LEVEL=INFO
LOG_FILE=/var/log/p2p-platform/signaling-server.log

# CORS settings
CORS_ORIGINS=*
