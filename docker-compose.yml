version: '3.8'

services:
  # STUN服务器
  stun-server:
    build:
      context: ./stun-server
      dockerfile: Dockerfile
    container_name: p2p-stun-server
    ports:
      - "3478:3478/udp"
      - "3479:3479/tcp"
    networks:
      - p2p-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "pytest", "tests/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Relay服务器 (TURN)
  relay-server:
    build:
      context: ./relay-server
      dockerfile: Dockerfile
    container_name: p2p-relay-server
    ports:
      - "50000-50010:50000-50010/udp"
      - "50000-50010:50000-50010/tcp"
    environment:
      - RELAY_MIN_PORT=50000
      - RELAY_MAX_PORT=50010
      - RELAY_MAX_ALLOCATIONS=1000
      - RELAY_ALLOCATION_LIFETIME=600
    networks:
      - p2p-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 信令服务器
  signaling-server:
    build:
      context: ./signaling-server
      dockerfile: Dockerfile
    container_name: p2p-signaling-server
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - SIGNALING_WS_PORT=8080
      - SIGNALING_WSS_PORT=8443
      - REDIS_URL=redis://redis:6379
      - DID_SERVICE_URL=http://did-service:9000
    depends_on:
      - redis
    networks:
      - p2p-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DID服务
  did-service:
    build:
      context: ./did-service
      dockerfile: Dockerfile
    container_name: p2p-did-service
    ports:
      - "9000:9000"
    environment:
      - DID_SERVICE_PORT=9000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-secret-key-change-in-production
      - JWT_EXPIRATION=3600
    depends_on:
      - redis
    networks:
      - p2p-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: p2p-redis
    ports:
      - "6379:6379"
    networks:
      - p2p-network
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

networks:
  p2p-network:
    driver: bridge

volumes:
  redis-data:
