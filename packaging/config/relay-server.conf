# Relay Server (TURN) Configuration
# Environment variables for systemd service

# Server binding
RELAY_HOST=0.0.0.0
RELAY_PORT=3478
RELAY_TLS_PORT=5349

# Redis connection
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_DB=0

# Authentication
TURN_SECRET=CHANGE_THIS_SECRET_KEY
TURN_REALM=p2p-platform.local

# Logging
LOG_LEVEL=INFO
LOG_FILE=/var/log/p2p-platform/relay-server.log

# Performance
MAX_ALLOCATIONS=1000
ALLOCATION_LIFETIME=600
